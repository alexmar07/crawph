version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - misspell
    - unconvert
    - unparam
    - copyloopvar
  settings:
    errcheck:
      check-type-assertions: true
      exclude-functions:
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
